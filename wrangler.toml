name = "mik-worker"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Cron Triggers — run every hour
[triggers]
crons = ["0 * * * *"]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "mik_db"
database_id = "bf91713c-3474-4e48-8ece-9a759707754b"

# Cloudflare Workers AI binding (free tier — used for title translation fallback)
[ai]
binding = "AI"

# Environment variables (non-secret)
[vars]
ENVIRONMENT = "production"
# rapid-mlx 모델 (기본값 — RAPID_MLX_URL secret 설정 후 활성화)
RAPID_MLX_MODEL = "mlx-community/gemma-3-4b-it-4bit"
# Ollama 모델 (rapid-mlx 미설정 시 fallback)
OLLAMA_MODEL = "qwen2.5:7b"

# Secrets — wrangler CLI로 설정:
#   wrangler secret put RAPID_MLX_URL   ← rapid-mlx 터널 URL (우선순위 1)
#   wrangler secret put OLLAMA_URL      ← Ollama 터널 URL   (우선순위 2)
#   wrangler secret put JWT_SECRET
#
# rapid-mlx 터널 실행:
#   python -m mlx_lm.server --model mlx-community/gemma-3-4b-it-4bit --port 8080
#   cloudflared tunnel --url http://localhost:8080
#
# Ollama 터널 실행:
#   cloudflared tunnel --url http://localhost:11434
