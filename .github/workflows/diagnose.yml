name: Diagnose MIK System
# v3b - 2026-05-22 run2: Worker API 전체 응답 + D1 직접 진단 강화

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/diagnose.yml'

jobs:
  diagnose:
    name: Full System Diagnosis
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install

      - name: D1 Database 진단
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          OUT="diagnose_result.txt"
          echo "=== D1 Database 진단 $(date -u) ===" > $OUT

          echo "--- 총 기사 수 ---" >> $OUT
          npx wrangler d1 execute mik_db --remote --command "SELECT COUNT(*) as total FROM articles" --json 2>&1 >> $OUT || echo "query failed" >> $OUT

          echo "--- 카테고리 분포 ---" >> $OUT
          npx wrangler d1 execute mik_db --remote --command "SELECT category, COUNT(*) as cnt FROM articles GROUP BY category ORDER BY cnt DESC" --json 2>&1 >> $OUT || echo "query failed" >> $OUT

          echo "--- insight 상태 분포 ---" >> $OUT
          npx wrangler d1 execute mik_db --remote --command "SELECT COALESCE(insight,'NULL'), COUNT(*) as cnt FROM articles GROUP BY insight ORDER BY cnt DESC LIMIT 10" --json 2>&1 >> $OUT || echo "query failed" >> $OUT

          echo "--- 최근 3개 기사 (전체 컬럼) ---" >> $OUT
          npx wrangler d1 execute mik_db --remote --command "SELECT id, title, category, insight, title_ko, created_at FROM articles ORDER BY created_at DESC LIMIT 3" --json 2>&1 >> $OUT || echo "query failed" >> $OUT

      - name: Worker API 테스트
        run: |
          OUT="diagnose_result.txt"
          echo "" >> $OUT
          echo "=== Worker API 테스트 $(date -u) ===" >> $OUT

          echo "--- /health ---" >> $OUT
          curl -s --max-time 10 "https://mik-worker.isg11882.workers.dev/health" >> $OUT 2>&1 || echo "FAILED" >> $OUT
          echo "" >> $OUT

          echo "--- /api/articles?limit=1 (전체 JSON) ---" >> $OUT
          curl -s --max-time 15 "https://mik-worker.isg11882.workers.dev/api/articles?limit=1" >> $OUT 2>&1 || echo "FAILED" >> $OUT
          echo "" >> $OUT

          echo "--- /api/articles?limit=3 total 카운트 ---" >> $OUT
          curl -s --max-time 15 "https://mik-worker.isg11882.workers.dev/api/articles?limit=3" 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print('total='+str(d.get('total'))+'  articles_returned='+str(len(d.get('articles',[]))))" >> $OUT 2>&1 || echo "parse failed" >> $OUT

          echo "--- /api/pending?limit=3 ---" >> $OUT
          curl -s --max-time 15 "https://mik-worker.isg11882.workers.dev/api/pending?limit=3" 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print('pending count='+str(d.get('count')))" >> $OUT 2>&1 || echo "parse failed" >> $OUT

          echo "--- CORS headers (Origin: pages.dev) ---" >> $OUT
          curl -s -I --max-time 10 -H "Origin: https://mik-dashboard.pages.dev" "https://mik-worker.isg11882.workers.dev/api/articles?limit=1" >> $OUT 2>&1 || echo "FAILED" >> $OUT

      - name: 결과 저장
        if: always()
        run: |
          echo ""
          echo "====== DIAGNOSE RESULT ======"
          cat diagnose_result.txt
          echo "=============================="
          git config user.email "premierplanlab@gmail.com"
          git config user.name "MIK-CI"
          git checkout -B ci-diagnose
          git add -f diagnose_result.txt
          git commit -m "diagnose: $(date -u +%H:%M:%S) [skip ci]" || true
          git push origin ci-diagnose --force 2>&1 || true
