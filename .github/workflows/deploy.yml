name: Deploy MIK to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        working-directory: worker
        run: npm install

      - name: Deploy Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          npx wrangler deploy 2>&1 | tee /tmp/worker.log
          echo "worker_exit:${PIPESTATUS[0]}"

      - name: Nuclear - Delete and recreate CF Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "" | base64 -d > /tmp/nuclear.py
          python3 /tmp/nuclear.py 2>&1 | tee /tmp/nuclear.log

      - name: Deploy Pages - fresh
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          echo "=== Fresh deploy to new mik-dashboard project ==="
          npx wrangler pages deploy ../frontend \
            --project-name mik-dashboard \
            --branch main \
            --commit-dirty=true \
            2>&1 | tee /tmp/pages-main.log
          MAIN_EXIT=${PIPESTATUS[0]}
          echo "pages_main_exit:${MAIN_EXIT}"
          DEPLOY_URL=$(grep -oP 'https://[a-f0-9]+\.mik-dashboard\.pages\.dev' /tmp/pages-main.log | tail -1 || echo "")
          echo "DEPLOY_URL=${DEPLOY_URL}" >> $GITHUB_ENV
          echo "New deployment URL: ${DEPLOY_URL}"
          if [ "${MAIN_EXIT}" -ne 0 ]; then
            cat /tmp/pages-main.log
            exit "${MAIN_EXIT}"
          fi

      - name: Verify production URL
        run: |
          sleep 5
          echo "=== Fetching mik-dashboard.pages.dev ==="
          curl -s -L --max-time 15 https://mik-dashboard.pages.dev \
            -w "\nHTTP_CODE:%{http_code}" | tee /tmp/prod-check.txt
          echo ""
          grep -oP '<!--.*?MIK.*?-->' /tmp/prod-check.txt || echo "No MIK comment found"

      - name: Push diagnostics to deploy-output
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_RUN: ${{ github.run_number }}
          GH_SHA: ${{ github.sha }}
        run: |
          {
            echo "=== RUN ${GH_RUN} SHA=${GH_SHA} ==="
            echo "--- NUCLEAR LOG ---"
            cat /tmp/nuclear.log 2>/dev/null || echo "missing"
            echo ""
            echo "--- PAGES MAIN LOG ---"
            cat /tmp/pages-main.log 2>/dev/null || echo "missing"
            echo ""
            echo "--- PROD CHECK ---"
            cat /tmp/prod-check.txt 2>/dev/null || echo "missing"
            echo ""
            echo "--- WORKER LOG ---"
            cat /tmp/worker.log 2>/dev/null || echo "missing"
          } > /tmp/diag.txt
          B64=$(base64 -w 0 /tmp/diag.txt)
          MAIN_SHA=$(git rev-parse HEAD)
          curl -s -X POST "https://api.github.com/repos/${GH_REPO}/git/refs" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"ref\":\"refs/heads/deploy-output\",\"sha\":\"${MAIN_SHA}\"}" > /dev/null
          EXISTING_SHA=$(curl -s \
            "https://api.github.com/repos/${GH_REPO}/contents/diag.txt?ref=deploy-output" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("sha",""))' 2>/dev/null || echo "")
          if [ -n "${EXISTING_SHA}" ]; then
            PUT_BODY="{\"message\":\"diag run#${GH_RUN}\",\"content\":\"${B64}\",\"branch\":\"deploy-output\",\"sha\":\"${EXISTING_SHA}\"}"
          else
            PUT_BODY="{\"message\":\"diag run#${GH_RUN}\",\"content\":\"${B64}\",\"branch\":\"deploy-output\"}"
          fi
          RESULT=$(curl -s -X PUT \
            "https://api.github.com/repos/${GH_REPO}/contents/diag.txt" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${PUT_BODY}")
          STATUS=$(echo "${RESULT}" | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("content",{}).get("name","FAIL:"+str(d.get("message","?"))))' 2>/dev/null || echo "error")
          echo "upload: ${STATUS}"
