name: Deploy MIK to Cloudflare

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        working-directory: worker
        run: npm install

      - name: Deploy Worker to Cloudflare Workers
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Get current CF Pages production_branch
        id: get_prod_branch
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          GET_RESP=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/mik-dashboard" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          CURRENT_PROD=$(echo "$GET_RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('result',{}).get('production_branch','unknown'))" 2>/dev/null || echo "unknown")
          echo "current_prod_branch=$CURRENT_PROD" >> $GITHUB_OUTPUT
          echo "Current production_branch: $CURRENT_PROD"

      - name: Patch CF Pages production_branch to main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PATCH_RESP=$(curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/mik-dashboard" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"production_branch":"main"}')
          NEW_PROD=$(echo "$PATCH_RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); print('success='+str(d.get('success'))+ ' new_prod_branch='+str(d.get('result',{}).get('production_branch','?')))" 2>/dev/null || echo "parse failed")
          echo "PATCH result: $NEW_PROD"

      - name: Deploy HTML to CF Pages as main branch
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Deploying frontend/ with --branch main"
          npx wrangler pages deploy frontend --project-name mik-dashboard --branch main
          echo "Deploy exit code: $?"

      - name: Also deploy as master branch (fallback for old production_branch)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Deploying frontend/ with --branch master (fallback)"
          npx wrangler pages deploy frontend --project-name mik-dashboard --branch master || echo "master branch deploy skipped or failed (ok)"
          echo "Done"
