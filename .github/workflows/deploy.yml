name: Deploy MIK to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        working-directory: worker
        run: npm install

      - name: Deploy Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          npx wrangler deploy 2>&1 | tee /tmp/worker.log
          echo "worker_exit:${PIPESTATUS[0]}"

      - name: Deploy Pages
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          npx wrangler pages deploy ../frontend \
            --project-name mik-dashboard \
            --branch main \
            --commit-dirty=true \
            2>&1 | tee /tmp/pages-main.log
          MAIN_EXIT=${PIPESTATUS[0]}
          echo "pages_main_exit:${MAIN_EXIT}"
          DEPLOY_URL=$(grep -oP 'https://[a-f0-9]+\.mik-dashboard\.pages\.dev' /tmp/pages-main.log | tail -1 || echo "")
          echo "DEPLOY_URL=${DEPLOY_URL}" >> $GITHUB_ENV
          echo "Deployment URL: ${DEPLOY_URL}"
          if [ "${MAIN_EXIT}" -ne 0 ]; then
            cat /tmp/pages-main.log
            exit "${MAIN_EXIT}"
          fi


      - name: Production Smoke Test
        env:
          DEPLOY_URL: ${{ env.DEPLOY_URL }}
        run: |
          echo '=== Waiting 10s for CDN propagation ===' | tee /tmp/prod-check.log
          sleep 10

          echo '=== PROD URL (mik-dashboard.pages.dev) ===' | tee -a /tmp/prod-check.log
          PROD_HTML=$(curl -s --max-time 15 https://mik-dashboard.pages.dev/ || echo 'CURL_FAILED')
          PROD_VER=$(echo "$PROD_HTML" | grep -oP 'MIK v[0-9.]+[^<"]*' | head -1 || echo 'not_found')
          PROD_SIZE=$(echo -n "$PROD_HTML" | wc -c)
          echo "prod_version: $PROD_VER" | tee -a /tmp/prod-check.log
          echo "prod_size: $PROD_SIZE" | tee -a /tmp/prod-check.log

          echo '' | tee -a /tmp/prod-check.log
          echo '=== Worker API (articles) ===' | tee -a /tmp/prod-check.log
          WORKER_RESP=$(curl -s --max-time 15 "https://mik-worker.isg11882.workers.dev/api/articles?limit=2" || echo 'CURL_FAILED')
          echo "worker_raw: $(echo "$WORKER_RESP" | head -c 300)" | tee -a /tmp/prod-check.log
          ARTICLE_COUNT=$(echo "$WORKER_RESP" | python3 -c 'import json,sys; d=json.load(sys.stdin); print(len(d.get("articles",[])))' 2>/dev/null || echo 'parse_error')
          echo "worker_article_count: $ARTICLE_COUNT" | tee -a /tmp/prod-check.log

      - name: Push diagnostics to deploy-output
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_RUN: ${{ github.run_number }}
          GH_SHA: ${{ github.sha }}
          DEPLOY_URL: ${{ env.DEPLOY_URL }}
        run: |
          {
            echo "=== RUN ${GH_RUN} SHA=${GH_SHA} ==="
            echo "deploy_url=${DEPLOY_URL}"
            echo "--- WORKER LOG ---"
            cat /tmp/worker.log 2>/dev/null || echo "missing"
            echo ""
            echo "--- PAGES MAIN LOG ---"
            echo ""
            echo "--- PROD CHECK ---"
            cat /tmp/prod-check.log 2>/dev/null || echo "missing"

            cat /tmp/pages-main.log 2>/dev/null || echo "missing"
          } > /tmp/diag.txt
          B64=$(base64 -w 0 /tmp/diag.txt)
          MAIN_SHA=$(git rev-parse HEAD)
          curl -s -X POST "https://api.github.com/repos/${GH_REPO}/git/refs" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"ref\":\"refs/heads/deploy-output\",\"sha\":\"${MAIN_SHA}\"}" > /dev/null
          EXISTING_SHA=$(curl -s \
            "https://api.github.com/repos/${GH_REPO}/contents/diag.txt?ref=deploy-output" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("sha",""))' 2>/dev/null || echo "")
          if [ -n "${EXISTING_SHA}" ]; then
            PUT_BODY="{\"message\":\"diag run#${GH_RUN}\",\"content\":\"${B64}\",\"branch\":\"deploy-output\",\"sha\":\"${EXISTING_SHA}\"}"
          else
            PUT_BODY="{\"message\":\"diag run#${GH_RUN}\",\"content\":\"${B64}\",\"branch\":\"deploy-output\"}"
          fi
          RESULT=$(curl -s -X PUT \
            "https://api.github.com/repos/${GH_REPO}/contents/diag.txt" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${PUT_BODY}")
          STATUS=$(echo "${RESULT}" | python3 -c \
            'import json,sys; d=json.load(sys.stdin); print(d.get("content",{}).get("name","FAIL:"+str(d.get("message","?"))))' \
            2>/dev/null || echo "error")
          echo "upload: ${STATUS}"
