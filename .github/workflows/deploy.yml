name: Deploy MIK to Cloudflare

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        working-directory: worker
        run: npm install

      - name: Deploy Worker to Cloudflare Workers
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Get current CF Pages production_branch
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          GET_RESP=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/mik-dashboard" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          echo "GET response snippet: $(echo "$GET_RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); r=d.get('result',{}); print('success=',d.get('success'),'prod_branch=',r.get('production_branch','?'),'deployment_configs=',list(r.get('deployment_configs',{}).keys()))" 2>/dev/null || echo "parse failed: $GET_RESP")"

      - name: Patch CF Pages production_branch to main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PATCH_RESP=$(curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/mik-dashboard" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"production_branch":"main"}')
          echo "PATCH result: $(echo "$PATCH_RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); print('success=',d.get('success'),'prod_branch=',d.get('result',{}).get('production_branch','?'))" 2>/dev/null || echo "parse failed")"

      - name: Deploy HTML to CF Pages (main = production after PATCH)
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Deploying ../frontend with --branch main"
          npx wrangler pages deploy ../frontend --project-name mik-dashboard --branch main
          echo "Exit: $?"

      - name: Deploy HTML to CF Pages (master = fallback production)
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Deploying ../frontend with --branch master (covers old production_branch=master)"
          npx wrangler pages deploy ../frontend --project-name mik-dashboard --branch master || true
          echo "Done"
