name: Deploy MIK to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        working-directory: worker
        run: npm install

      - name: Deploy Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          npx wrangler deploy 2>&1 | tee /tmp/worker.log
          echo "worker_exit:${PIPESTATUS[0]}"

      - name: CF Pages - List and clean stuck deployments
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DEPS=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/mik-dashboard/deployments?per_page=25" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          echo "$DEPS" > /tmp/deps-before.json
          echo "" | base64 -d > /tmp/list_deps.py
          python3 /tmp/list_deps.py

      - name: CF Pages GET + PATCH production_branch
        id: cf_diag
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          CF_GET=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/mik-dashboard" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          echo "$CF_GET" > /tmp/cf-get.json
          PROD_BRANCH=$(echo "$CF_GET" | python3 -c \
            'import json,sys; d=json.load(sys.stdin); print(d.get("result",{}).get("production_branch","MISSING"))' \
            2>/dev/null || echo "parse_error")
          echo "CF GET: production_branch=${PROD_BRANCH}"
          echo "PROD_BRANCH=${PROD_BRANCH}" >> $GITHUB_ENV
          CF_PATCH=$(curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/mik-dashboard" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"production_branch":"main"}')
          echo "$CF_PATCH" > /tmp/cf-patch.json
          PATCH_OK=$(echo "$CF_PATCH" | python3 -c \
            'import json,sys; d=json.load(sys.stdin); print(d.get("success","?"))' \
            2>/dev/null || echo "parse_error")
          echo "CF PATCH: success=${PATCH_OK}"

      - name: Deploy Pages
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          echo "=== Deploying frontend to CF Pages (branch: main) ==="
          npx wrangler pages deploy ../frontend \
            --project-name mik-dashboard \
            --branch main \
            --commit-dirty=true \
            2>&1 | tee /tmp/pages-main.log
          MAIN_EXIT=${PIPESTATUS[0]}
          echo "pages_main_exit:${MAIN_EXIT}"
          DEPLOY_URL=$(grep -oP 'https://[a-f0-9]+\.mik-dashboard\.pages\.dev' /tmp/pages-main.log | tail -1 || echo "")
          echo "DEPLOY_URL=${DEPLOY_URL}" >> $GITHUB_ENV
          echo "Deployment preview URL: ${DEPLOY_URL}"
          if [ "${MAIN_EXIT}" -ne 0 ]; then
            echo "ERROR: wrangler pages deploy failed"
            exit "${MAIN_EXIT}"
          fi

      - name: Verify deployment content
        env:
          DEPLOY_URL: ${{ env.DEPLOY_URL }}
        run: |
          echo "" | base64 -d > /tmp/verify_content.py
          python3 /tmp/verify_content.py 2>&1 | tee /tmp/verify-content.log

      - name: Purge CF Pages cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "" | base64 -d > /tmp/purge_cache.py
          python3 /tmp/purge_cache.py 2>&1 | tee /tmp/purge.log

      - name: Verify and promote production deployment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEPLOY_URL: ${{ env.DEPLOY_URL }}
        run: |
          DEPS=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/mik-dashboard/deployments?per_page=10" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          echo "$DEPS" > /tmp/deps-after.json
          echo "" | base64 -d > /tmp/verify_promote.py
          python3 /tmp/verify_promote.py

      - name: Push diagnostics to deploy-output
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_RUN: ${{ github.run_number }}
          GH_SHA: ${{ github.sha }}
        run: |
          {
            echo "=== RUN ${GH_RUN} SHA=${GH_SHA} ==="
            echo "--- CF GET ---"
            cat /tmp/cf-get.json 2>/dev/null || echo "missing"
            echo ""
            echo "--- CF PATCH ---"
            cat /tmp/cf-patch.json 2>/dev/null || echo "missing"
            echo ""
            echo "--- DEPS BEFORE ---"
            cat /tmp/deps-before.json 2>/dev/null || echo "missing"
            echo ""
            echo "--- DEPS AFTER ---"
            cat /tmp/deps-after.json 2>/dev/null || echo "missing"
            echo ""
            echo "--- RETRY ---"
            cat /tmp/retry.json 2>/dev/null || echo "missing"
            echo ""
            echo "--- VERIFY CONTENT ---"
            cat /tmp/verify-content.log 2>/dev/null || echo "missing"
            echo ""
            echo "--- PURGE LOG ---"
            cat /tmp/purge.log 2>/dev/null || echo "missing"
            echo ""
            echo "--- WORKER LOG ---"
            cat /tmp/worker.log 2>/dev/null || echo "missing"
            echo ""
            echo "--- PAGES MAIN LOG ---"
            cat /tmp/pages-main.log 2>/dev/null || echo "missing"
          } > /tmp/diag.txt
          B64=$(base64 -w 0 /tmp/diag.txt)
          MAIN_SHA=$(git rev-parse HEAD)
          curl -s -X POST "https://api.github.com/repos/${GH_REPO}/git/refs" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{"ref":"refs/heads/deploy-output","sha":"${MAIN_SHA}"}" > /tmp/branch-create.log
          EXISTING_SHA=$(curl -s \
            "https://api.github.com/repos/${GH_REPO}/contents/diag.txt?ref=deploy-output" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("sha",""))' 2>/dev/null || echo "")
          if [ -n "${EXISTING_SHA}" ]; then
            PUT_BODY="{"message":"diag run#${GH_RUN}","content":"${B64}","branch":"deploy-output","sha":"${EXISTING_SHA}"}"
          else
            PUT_BODY="{"message":"diag run#${GH_RUN}","content":"${B64}","branch":"deploy-output"}"
          fi
          RESULT=$(curl -s -X PUT \
            "https://api.github.com/repos/${GH_REPO}/contents/diag.txt" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${PUT_BODY}")
          STATUS=$(echo "${RESULT}" | python3 -c \
            'import json,sys; d=json.load(sys.stdin); print(d.get("content",{}).get("name","FAIL:"+str(d.get("message","?"))))' \
            2>/dev/null || echo "error")
          echo "deploy-output upload: ${STATUS}"
