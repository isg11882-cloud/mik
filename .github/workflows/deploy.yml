name: Deploy MIK to Cloudflare

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Deploy Worker to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          npx wrangler deploy 2>&1 | tee /tmp/worker-deploy.log

      - name: Deploy HTML to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          mkdir -p dist
          cp MIK_MICE_Insight_Korea.html dist/index.html
          # --branch 미지정 시 git HEAD 브랜치(master) 자동 감지 → 프로덕션 배포
          npx wrangler pages deploy dist \
            --project-name mik-dashboard \
            --commit-dirty=true \
            2>&1 | tee /tmp/pages-deploy.log
          cat /tmp/pages-deploy.log
