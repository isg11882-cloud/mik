name: Deploy MIK to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        working-directory: worker
        run: npm install

      - name: Deploy Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          npx wrangler deploy 2>&1 | tee /tmp/worker.log
          echo "worker_exit:${PIPESTATUS[0]}"

      - name: CF Pages GET + PATCH production_branch
        id: cf_diag
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          CF_GET=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/mik-dashboard" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          echo "$CF_GET" > /tmp/cf-get.json

          PROD_BRANCH=$(echo "$CF_GET" | python3 -c \
            'import json,sys; d=json.load(sys.stdin); print(d.get("result",{}).get("production_branch","MISSING"))' \
            2>/dev/null || echo "parse_error")
          CF_SUCCESS=$(echo "$CF_GET" | python3 -c \
            'import json,sys; d=json.load(sys.stdin); print(d.get("success","?"))' \
            2>/dev/null || echo "parse_error")
          echo "CF GET: success=${CF_SUCCESS} production_branch=${PROD_BRANCH}"
          echo "PROD_BRANCH=${PROD_BRANCH}" >> $GITHUB_ENV

          CF_PATCH=$(curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/mik-dashboard" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"production_branch":"main"}')
          echo "$CF_PATCH" > /tmp/cf-patch.json
          PATCH_OK=$(echo "$CF_PATCH" | python3 -c \
            'import json,sys; d=json.load(sys.stdin); print(d.get("success","?"))' \
            2>/dev/null || echo "parse_error")
          NEW_PROD=$(echo "$CF_PATCH" | python3 -c \
            'import json,sys; d=json.load(sys.stdin); print(d.get("result",{}).get("production_branch","?"))' \
            2>/dev/null || echo "parse_error")
          echo "CF PATCH: success=${PATCH_OK} new_production_branch=${NEW_PROD}"

      - name: Deploy Pages
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROD_BRANCH: ${{ env.PROD_BRANCH }}
        run: |
          set -o pipefail
          echo "=== Deploy to branch: main (production after PATCH) ==="
          npx wrangler pages deploy ../frontend --project-name mik-dashboard --branch main 2>&1 | tee /tmp/pages-main.log
          MAIN_EXIT=${PIPESTATUS[0]}
          echo "pages_main_exit:${MAIN_EXIT}"

          # If original production_branch differs from main, also deploy there
          if [ -n "${PROD_BRANCH}" ] && [ "${PROD_BRANCH}" != "main" ] && [ "${PROD_BRANCH}" != "MISSING" ] && [ "${PROD_BRANCH}" != "parse_error" ]; then
            echo "=== Also deploying to original production branch: ${PROD_BRANCH} ==="
            npx wrangler pages deploy ../frontend --project-name mik-dashboard --branch "${PROD_BRANCH}" 2>&1 | tee /tmp/pages-orig.log || true
            echo "pages_orig_exit:${PIPESTATUS[0]}"
          fi

      - name: Push diagnostics to deploy-output
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_RUN: ${{ github.run_number }}
          GH_SHA: ${{ github.sha }}
        run: |
          # Combine all logs into one plain text file
          {
            echo "=== RUN ${GH_RUN} SHA=${GH_SHA} ==="
            echo "--- CF GET ---"
            cat /tmp/cf-get.json 2>/dev/null || echo "missing"
            echo ""
            echo "--- CF PATCH ---"
            cat /tmp/cf-patch.json 2>/dev/null || echo "missing"
            echo ""
            echo "--- WORKER LOG ---"
            cat /tmp/worker.log 2>/dev/null || echo "missing"
            echo ""
            echo "--- PAGES MAIN LOG ---"
            cat /tmp/pages-main.log 2>/dev/null || echo "missing"
            echo ""
            echo "--- PAGES ORIG LOG ---"
            cat /tmp/pages-orig.log 2>/dev/null || echo "missing"
          } > /tmp/diag.txt

          # Base64 encode (no newlines)
          B64=$(base64 -w 0 /tmp/diag.txt)

          # Try to create deploy-output branch (ignore error if it already exists)
          MAIN_SHA=$(git rev-parse HEAD)
          curl -s -X POST "https://api.github.com/repos/${GH_REPO}/git/refs" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"ref\":\"refs/heads/deploy-output\",\"sha\":\"${MAIN_SHA}\"}" > /tmp/branch-create.log

          # Get existing file SHA (needed for update if file already exists)
          EXISTING_SHA=$(curl -s \
            "https://api.github.com/repos/${GH_REPO}/contents/diag.txt?ref=deploy-output" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("sha",""))' 2>/dev/null || echo "")

          # Build PUT body - include sha only if file exists
          if [ -n "${EXISTING_SHA}" ]; then
            PUT_BODY="{\"message\":\"diag run#${GH_RUN}\",\"content\":\"${B64}\",\"branch\":\"deploy-output\",\"sha\":\"${EXISTING_SHA}\"}"
          else
            PUT_BODY="{\"message\":\"diag run#${GH_RUN}\",\"content\":\"${B64}\",\"branch\":\"deploy-output\"}"
          fi

          RESULT=$(curl -s -X PUT \
            "https://api.github.com/repos/${GH_REPO}/contents/diag.txt" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${PUT_BODY}")

          STATUS=$(echo "${RESULT}" | python3 -c \
            'import json,sys; d=json.load(sys.stdin); print(d.get("content",{}).get("name","FAIL:"+str(d.get("message","?"))))' \
            2>/dev/null || echo "error")
          echo "deploy-output upload: ${STATUS}"
