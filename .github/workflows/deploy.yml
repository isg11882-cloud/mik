name: Deploy MIK to Cloudflare

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        working-directory: worker
        run: npm install

      - name: Deploy Worker to Cloudflare Workers
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Set Pages production branch to main & Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          echo "=== Step 1: Set production_branch=main on CF Pages project ==="
          PATCH_RESP=$(curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/mik-dashboard" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"production_branch":"main"}')
          echo "Patch response: $(echo $PATCH_RESP | python3 -c 'import json,sys; d=json.load(sys.stdin); print("success=", d.get("success"), "prod_branch=", d.get("result",{}).get("production_branch","?"))')" || echo "Patch raw: $PATCH_RESP"

          echo ""
          echo "=== Step 2: Deploy HTML to CF Pages (production) ==="
          cd worker
          npx wrangler pages deploy ../frontend --project-name mik-dashboard --branch main 2>&1
